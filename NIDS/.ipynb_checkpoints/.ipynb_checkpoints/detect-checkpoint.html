<!DOCTYPE html>
<html>
<head>
<title>NIDS Detection</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, Arial, sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

/* CARD */
.container{
  width:100%;
  max-width:560px;
  background:#111827;
  padding:24px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,255,255,0.25);
}

/* TITLES */
h1{
  text-align:center;
  color:#22d3ee;
  margin-bottom:10px;
  font-size:20px;
}

h2{
  text-align:center;
  color:#60a5fa;
  margin:16px 0;
  font-size:14px;
}

/* 🔥 AUTO-FIT GRID (BEST SIZE) */
.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

/* FIELD */
.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-size:12px;
  margin-bottom:4px;
  color:#cbd5f5;
}

/* INPUT */
input,select{
  width:100%;
  height:36px;
  padding:6px;
  border-radius:6px;
  border:none;
  outline:none;
  font-size:13px;
  background:#e5e7eb;
  color:black;
}

/* BUTTON */
button{
  width:100%;
  max-width:260px;
  height:38px;
  margin:18px auto 0;
  display:block;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#06b6d4,#3b82f6);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
}

/* DIVIDER */
hr{
  margin:20px 0;
  border:1px solid #334155;
}

/* RESULT */
.result-box{
  margin-top:15px;
  padding:15px;
  background:#0f172a;
  border-radius:10px;
  text-align:center;
}

.safe{color:#22c55e;}
.danger{color:#ef4444;}
</style>

</head>

<body>

<div class="container">

<h1>🚀 Network Intrusion Detection System</h1>

<h2>Manual Detection</h2>

<form action="/predict" method="post">

<div class="form-grid">

<!-- DoS -->
<div class="form-group">
<label>Count</label>
<input type="number" name="count" required>
</div>

<div class="form-group">
<label>Serror Rate</label>
<input type="number" step="0.01" name="serror_rate" required>
</div>

<!-- Probe -->
<div class="form-group">
<label>Same Service Rate</label>
<input type="number" step="0.01" name="same_srv_rate" required>
</div>

<div class="form-group">
<label>Diff Service Rate</label>
<input type="number" step="0.01" name="dst_host_diff_srv_rate" required>
</div>

<div class="form-group">
<label>Same Src Port Rate</label>
<input type="number" step="0.01" name="dst_host_same_src_port_rate" required>
</div>

<div class="form-group">
<label>Host Service Count</label>
<input type="number" name="dst_host_srv_count" required>
</div>

<!-- R2L -->
<div class="form-group">
<label>Logged In</label>
<select name="logged_in">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="form-group">
<label>Failed Logins</label>
<input type="number" name="num_failed_logins" value="0">
</div>

<!-- U2R -->
<div class="form-group">
<label>Access Files</label>
<input type="number" name="num_access_files" value="0">
</div>

<div class="form-group">
<label>Root Shell</label>
<select name="root_shell">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

</div>

<button type="submit">🚀 Predict Attack</button>

</form>

<hr>

<h2>Bulk Detection</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

<input type="file" name="file" required>

<button type="submit">Upload & Detect</button>

</form>

{% if output %}

<div class="result-box">

<div class="{{ status }}">
{% if status == "safe" %}
✅ SAFE
{% else %}
⚠️ ATTACK DETECTED
{% endif %}
</div>

<div>{{ output|safe }}</div>

</div>

{% endif %}

</div>

</body>
</html>
