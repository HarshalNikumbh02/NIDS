<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel - NIDS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0a0f1c;
            color: white;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            background: #020617;
            box-shadow: 0 0 10px cyan;
        }

        .navbar-brand {
            color: cyan !important;
            font-weight: bold;
        }

        /* Card */
        .card {
            background: #111827;
            border: none;
            border-radius: 10px;
            box-shadow: 0 0 15px cyan;
        }

        /* Table */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .table thead {
            background: cyan;
            color: black;
        }

        /* Buttons */
        .btn-custom {
            background: cyan;
            border: none;
            color: black;
            font-weight: bold;
        }

        .btn-custom:hover {
            background: #00cccc;
        }

        /* Title */
        .title {
            color: cyan;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand">NIDS Admin</a>

            <div>
                <a href="/dashboard" class="btn btn-outline-info me-2">Dashboard</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container mt-5">

        <h2 class="title">👨‍💻 Admin Panel - User Management</h2>

        <div class="card p-4">

            <table class="table table-dark table-striped table-bordered mt-3">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                </thead>

                <tbody>
                    {% for user in users %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ user.name }}</td>
                        <td>{{ user.email }}</td>
                        <td>
                            {% if user.role == "admin" %}
                            <span class="badge bg-danger">Admin</span>
                            {% else %}
                            <span class="badge bg-success">User</span>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

        <div class="text-center mt-4">
            <a href="/dashboard" class="btn btn-custom">⬅ Back to Dashboard</a>
        </div>

    </div>

</body>

</html>
