<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIDS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/*  COLORS */
:root{
--primary:#6366f1;
--secondary:#06b6d4;
--bg1:#020617;
--bg2:#0f172a;
--bg3:#1e293b;
}

/*  BACKGROUND */
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
color:white;
overflow-x:hidden;
}

/* ✨ GLOW */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%, var(--primary), transparent 40%),
radial-gradient(circle at 70% 60%, var(--secondary), transparent 40%);
filter:blur(120px);
opacity:0.25;
z-index:0;
}

/* NAVBAR */
.navbar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
position:relative;
z-index:2;
}

.navbar-brand{
color:var(--secondary) !important;
font-weight:bold;
}

/* CONTAINER */
.login-container{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:1;
}

/* 🤍 WHITE CARD (MATCH REGISTER) */
.login-box{
background:#ffffff;
padding:40px;
border-radius:18px;
width:100%;
max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
color:#0f172a;
}

/* TITLE */
.login-box h2{
text-align:center;
margin-bottom:25px;
color:var(--primary);
}

/* INPUT */
.form-control{
background:#f8fafc;
border:1px solid #cbd5f5;
color:#0f172a;
border-radius:10px;
}

.form-control:focus{
border-color:var(--primary);
box-shadow:0 0 10px rgba(99,102,241,0.2);
background:#ffffff;
}

/* BUTTON */
.login-btn{
width:100%;
background:linear-gradient(90deg,var(--primary),var(--secondary));
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
color:white;
transition:0.3s;
}

.login-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* PASSWORD ICON */
.password-wrapper{
position:relative;
}

.toggle-password{
position:absolute;
top:50%;
right:15px;
transform:translateY(-50%);
cursor:pointer;
color:#64748b;
}

/* LINK */
.register-link{
text-align:center;
margin-top:18px;
}

.register-link a{
color:var(--primary);
text-decoration:none;
}

.register-link a:hover{
text-decoration:underline;
}

/* MOBILE */
@media(max-width:500px){
.login-box{
padding:25px;
}
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="container">
<span class="navbar-brand">NIDS Security</span>

<div>
<a href="/" class="btn btn-outline-light me-2">Home</a>
<a href="/register" class="btn btn-light">Register</a>
</div>
</div>
</nav>

<!-- LOGIN -->
<div class="login-container">

<div class="login-box">

<h2>Login</h2>

<form action="/login" method="POST">

<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="Email" required>
</div>

<div class="mb-3 password-wrapper">
<input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
<span class="toggle-password" onclick="togglePassword()">👁️</span>
</div>

<button type="submit" class="login-btn">Login</button>

</form>

<div class="register-link">
<p>Don't have an account?</p>
<a href="/register">Create Account</a>
</div>

</div>

</div>

<script>
function togglePassword(){
const pass = document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
