<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIDS Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/*  COLORS */
:root{
--primary:#6366f1;
--secondary:#06b6d4;
--bg1:#020617;
--bg2:#0f172a;
--bg3:#1e293b;
}

/* 🌈 BACKGROUND */
body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
color:white;
overflow-x:hidden;
}

/* ✨ GLOW */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 30% 30%, var(--primary), transparent 40%),
radial-gradient(circle at 70% 60%, var(--secondary), transparent 40%);
filter:blur(120px);
opacity:0.25;
z-index:0;
}

/* NAVBAR */
.navbar{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.navbar-brand{
color:var(--secondary) !important;
font-weight:bold;
}

/* CONTAINER */
.register-container{
min-height:90vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:1;
}

/* 🤍 WHITE FORM CARD */
.register-box{
background:#ffffff;
padding:40px;
border-radius:18px;
width:100%;
max-width:420px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
color:#0f172a;
}

/* TITLE */
.register-box h2{
text-align:center;
margin-bottom:25px;
color:var(--primary);
}

/* INPUT */
.form-control{
background:#f8fafc;
border:1px solid #cbd5f5;
color:#0f172a;
border-radius:10px;
}

.form-control:focus{
border-color:var(--primary);
box-shadow:0 0 10px rgba(99,102,241,0.2);
background:#ffffff;
}

/* BUTTON */
.register-btn{
width:100%;
background:linear-gradient(90deg,var(--primary),var(--secondary));
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
color:white;
transition:0.3s;
}

.register-btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* ALERT */
.alert{
border-radius:10px;
font-size:14px;
}

/* LINK */
.login-link{
text-align:center;
margin-top:18px;
}

.login-link a{
color:var(--primary);
text-decoration:none;
}

.login-link a:hover{
text-decoration:underline;
}

/* PASSWORD ICON */
.password-wrapper{
position:relative;
}

.toggle-password{
position:absolute;
top:50%;
right:15px;
transform:translateY(-50%);
cursor:pointer;
color:#64748b;
}

/* MOBILE */
@media(max-width:500px){
.register-box{
padding:25px;
}
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
<div class="container">

<a class="navbar-brand">NIDS Security</a>

<div>
<a href="/" class="btn btn-outline-light me-2">Home</a>
<a href="/login" class="btn btn-light">Login</a>
</div>

</div>
</nav>

<!-- REGISTER -->
<div class="register-container">

<div class="register-box">

<h2>Create Account</h2>

<!-- FLASH MESSAGE -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{category}} text-center">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form action="/register" method="POST">

<div class="mb-3">
<input type="text" name="name" class="form-control" placeholder="Full Name" required>
</div>

<div class="mb-3">
<input type="email" name="email" id="email"
class="form-control"
placeholder="Email Address"
required
pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
title="Enter valid email (example: user@gmail.com)">
</div>

<div class="mb-3 password-wrapper">
<input type="password" name="password" id="password"
class="form-control"
placeholder="Password"
required>
<span class="toggle-password" onclick="togglePassword()">👁️</span>
</div>

<div class="mb-3">
<input type="password" name="confirm_password" id="confirm_password"
class="form-control"
placeholder="Confirm Password"
required>
</div>

<button type="submit" class="register-btn">Register</button>

</form>

<div class="login-link">
<p>Already have an account?</p>
<a href="/login">Login Here</a>
</div>

</div>

</div>

<script>

/* 👁 PASSWORD TOGGLE */
function togglePassword(){
const pass = document.getElementById("password");
pass.type = pass.type === "password" ? "text" : "password";
}

/* 🔒 EMAIL VALIDATION */
const emailInput = document.getElementById("email");

emailInput.addEventListener("input", function(){
if (emailInput.validity.patternMismatch || emailInput.validity.typeMismatch){
    emailInput.setCustomValidity("Enter valid email (example: user@gmail.com)");
} else {
    emailInput.setCustomValidity("");
}
});

/* 🔒 PASSWORD MATCH */
const form = document.querySelector("form");

form.addEventListener("submit", function(e){
const pass = document.getElementById("password").value;
const confirm = document.getElementById("confirm_password").value;

if(pass !== confirm){
    e.preventDefault();
    alert("Passwords do not match!");
}
});

</script>

</body>
</html>
